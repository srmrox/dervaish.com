<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dervaish — system map — system map</title>
<style>
:root {
  --paper: #eef1f2;
  --paper-2: #f7f9f9;
  --grid: #d8dee0;
  --ink: #16283d;
  --ink-soft: #5a6b7d;
  --line: #c3ccd1;
  --blue: #2e6f8e;
  --blue-soft: #dbe7ed;
  --rust: #b4571f;
  --rust-soft: #f3e2d6;
  --up: #2f7d5d;
  --degraded: #b98700;
  --down: #b03636;
  --unknown: #9aa7b1;
  --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Mono", Menlo, Consolas, monospace;
  --sans: "Inter", "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: var(--sans);
  color: var(--ink);
  background-color: var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 28px 28px;
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
  overflow: hidden;
}

header {
  border-bottom: 1px solid var(--line);
  background: var(--paper-2);
  padding: 14px 20px;
  display: flex;
  align-items: baseline;
  gap: 18px;
  flex-wrap: wrap;
}

.eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-soft);
}

h1 {
  font-size: 19px;
  margin: 0;
  letter-spacing: -0.01em;
  font-weight: 600;
}

.meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-soft);
  margin-left: auto;
  text-align: right;
  line-height: 1.6;
}

main { display: grid; grid-template-columns: 1fr 340px; min-height: 0; }

#cy { width: 100%; height: 100%; }

aside {
  border-left: 1px solid var(--line);
  background: var(--paper-2);
  overflow-y: auto;
  padding: 0 0 40px;
}

section { border-bottom: 1px solid var(--line); padding: 16px 18px; }
section h2 {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin: 0 0 12px;
  font-weight: 500;
}

.legend-row { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; font-size: 12px; }
.swatch { width: 14px; height: 14px; border-radius: 3px; flex: none; border: 1.5px solid var(--ink); }
.swatch.component { background: var(--blue-soft); border-color: var(--blue); }
.swatch.datastore { background: #fff; border-color: var(--ink); border-radius: 7px / 3px; }
.swatch.external_service { background: var(--rust-soft); border-color: var(--rust); }
.swatch.client { background: #fff; border-color: var(--ink-soft); border-radius: 50%; }
.swatch.inferred { background: transparent; border-style: dashed; border-color: var(--ink-soft); }

.hint { font-size: 11.5px; color: var(--ink-soft); line-height: 1.55; margin: 10px 0 0; }

#detail .placeholder { font-size: 12.5px; color: var(--ink-soft); line-height: 1.6; }
#detail h3 { margin: 0 0 2px; font-size: 15px; }
.kindline { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); margin-bottom: 12px; }
.purpose { font-size: 13px; line-height: 1.55; margin: 0 0 14px; }

dl { margin: 0; font-size: 12px; }
dt {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-top: 12px;
}
dd { margin: 3px 0 0; font-family: var(--mono); font-size: 11.5px; line-height: 1.6; word-break: break-all; }

.tag {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  border: 1px solid var(--line);
  background: #fff;
}
.tag.declared { border-color: var(--blue); color: var(--blue); }
.tag.inferred { border-color: var(--rust); color: var(--rust); border-style: dashed; }

ul.plain { list-style: none; margin: 0; padding: 0; font-size: 12px; line-height: 1.65; }
ul.plain li { padding: 6px 0; border-bottom: 1px dotted var(--line); }
ul.plain li:last-child { border-bottom: 0; }
ul.plain code { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); }

button.node-link {
  background: none; border: 0; padding: 0; cursor: pointer;
  font: inherit; color: var(--ink); text-decoration: underline;
  text-decoration-color: var(--line); text-underline-offset: 3px;
}
button.node-link:hover { text-decoration-color: var(--rust); }

.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.dot.up { background: var(--up); }
.dot.degraded { background: var(--degraded); }
.dot.down { background: var(--down); }
.dot.unknown { background: var(--unknown); }

.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.controls button {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase;
  background: #fff; border: 1px solid var(--line); color: var(--ink-soft);
  padding: 5px 10px; border-radius: 3px; cursor: pointer;
}
.controls button:hover { border-color: var(--blue); color: var(--blue); }
.controls button:focus-visible, button.node-link:focus-visible { outline: 2px solid var(--rust); outline-offset: 2px; }

@media (max-width: 900px) {
  main { grid-template-columns: 1fr; grid-template-rows: 55vh 1fr; }
  aside { border-left: 0; border-top: 1px solid var(--line); }
}

</style>
</head>
<body>
<header>
  <div>
    <div class="eyebrow">System map</div>
    <h1 id="title"></h1>
    <div class="eyebrow" id="notes" style="text-transform:none;letter-spacing:0;margin-top:4px"></div>
  </div>
  <div class="controls">
    <button id="fit">Fit</button>
    <button id="relayout">Re-layout</button>
    <button id="png">Save PNG</button>
  </div>
  <div class="meta" id="meta"></div>
</header>

<main>
  <div id="cy"></div>
  <aside>
    <section>
      <h2>Status</h2>
      <div class="hint" id="statusline"></div>
    </section>

    <section id="detail-section">
      <h2>Selected</h2>
      <div id="detail"></div>
    </section>

    <section id="confirm"></section>

    <section>
      <h2>Legend</h2>
      <div class="legend-row"><span class="swatch component"></span> Component we run</div>
      <div class="legend-row"><span class="swatch datastore"></span> Datastore we run</div>
      <div class="legend-row"><span class="swatch external_service"></span> Third-party service</div>
      <div class="legend-row"><span class="swatch client"></span> Client we don't deploy</div>
      <div class="legend-row"><span class="swatch inferred"></span> Dashed = inferred from code</div>
      <p class="hint">Solid outlines and lines are declared in deploy config. Rust lines are the ones that leave your infrastructure.</p>
    </section>
  </aside>
</main>

<script>
/* Renders SYSTEM (injected by build_map.py) into a cytoscape graph.
   Panels are built before the graph so that if the graph engine fails for any reason,
   the evidence, the connections, and the needs-confirmation list are all still readable. */
(function () {
  const S = window.SYSTEM;
  const byId = Object.fromEntries(S.nodes.map((n) => [n.id, n]));
  const isExternal = (id) => byId[id] && byId[id].kind === "external_service";
  const esc = (s) => String(s).replace(/[<>&]/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));

  /* ---------- header ---------- */
  document.getElementById("title").textContent = S.meta.title || S.meta.repo;
  document.getElementById("meta").innerHTML =
    `${S.nodes.length} nodes &middot; ${S.edges.length} connections<br>` +
    `analyzed ${esc(S.meta.analyzed_at)}${S.meta.commit ? " @ " + esc(S.meta.commit.slice(0, 7)) : ""}`;
  if (S.meta.notes) document.getElementById("notes").textContent = S.meta.notes;

  /* ---------- detail panel ---------- */
  const detail = document.getElementById("detail");
  let cy = null;

  function connList(list, dir) {
    if (!list.length) return "<li><em>none</em></li>";
    return list
      .map((e) => {
        const other = dir === "out" ? e.to : e.from;
        return (
          `<li>${esc(e.type)} ` +
          `<button class="node-link" data-goto="${esc(other)}">${esc((byId[other] || {}).label || other)}</button>` +
          (e.label ? ` <code>${esc(e.label)}</code>` : "") +
          `<br><code>${esc(e.evidence.join(", "))}</code></li>`
        );
      })
      .join("");
  }

  function showNode(id) {
    const n = byId[id];
    if (!n) return;
    const outs = S.edges.filter((e) => e.from === id);
    const ins = S.edges.filter((e) => e.to === id);

    detail.innerHTML =
      `<h3><span class="dot ${esc(n.status || "unknown")}"></span>${esc(n.label)}</h3>` +
      `<div class="kindline">${esc(n.kind.replace(/_/g, " "))} / ${esc(n.subtype || "—")}` +
      `${n.tech ? " · " + esc(n.tech) : ""}</div>` +
      (n.purpose ? `<p class="purpose">${esc(n.purpose)}</p>` : "") +
      "<dl>" +
      `<dt>Confidence</dt><dd><span class="tag ${esc(n.confidence)}">${esc(n.confidence)}</span></dd>` +
      (n.path ? `<dt>Path</dt><dd>${esc(n.path)}</dd>` : "") +
      `<dt>Evidence</dt><dd>${n.evidence.map(esc).join("<br>")}</dd>` +
      `<dt>Depends on (${outs.length})</dt><dd><ul class="plain">${connList(outs, "out")}</ul></dd>` +
      `<dt>Depended on by (${ins.length})</dt><dd><ul class="plain">${connList(ins, "in")}</ul></dd>` +
      "</dl>";

    if (cy) {
      cy.elements().addClass("dim");
      const el = cy.$id(id);
      el.removeClass("dim");
      el.connectedEdges().removeClass("dim").addClass("hl").connectedNodes().removeClass("dim");
    }
  }

  function clearDetail() {
    if (cy) {
      cy.elements().removeClass("dim hl");
      cy.$(":selected").unselect();
    }
    detail.innerHTML =
      '<p class="placeholder">Select a box to see what it is, what it talks to, and the file and line that prove it.</p>';
  }
  clearDetail();

  detail.addEventListener("click", (e) => {
    const t = e.target.closest("[data-goto]");
    if (!t) return;
    if (cy) cy.$id(t.dataset.goto).select();
    showNode(t.dataset.goto);
  });

  /* ---------- needs confirmation ---------- */
  const inferredNodes = S.nodes.filter((n) => n.confidence === "inferred");
  const inferredEdges = S.edges.filter((e) => e.confidence === "inferred");
  const questions = S.open_questions || [];
  const confirm = document.getElementById("confirm");

  if (!inferredNodes.length && !inferredEdges.length && !questions.length) {
    confirm.innerHTML =
      '<h2>Needs confirmation</h2><p class="hint">Nothing was inferred — every box and line came straight from deploy config.</p>';
  } else {
    confirm.innerHTML =
      "<h2>Needs confirmation</h2>" +
      '<ul class="plain">' +
      inferredNodes
        .map(
          (n) =>
            `<li>Does <button class="node-link" data-goto="${esc(n.id)}">${esc(n.label)}</button> exist?` +
            `<br><code>${esc(n.evidence[0])}</code></li>`
        )
        .join("") +
      inferredEdges
        .map(
          (e) =>
            `<li>Does ${esc((byId[e.from] || {}).label || e.from)} really ${esc(e.type)} ` +
            `${esc((byId[e.to] || {}).label || e.to)}?<br><code>${esc(e.evidence[0])}</code></li>`
        )
        .join("") +
      questions.map((q) => `<li>${esc(q)}</li>`).join("") +
      "</ul>" +
      '<p class="hint">Correct these in <code>system.overrides.json</code> and rebuild. Your edits survive the next analysis.</p>';
  }

  confirm.addEventListener("click", (e) => {
    const t = e.target.closest("[data-goto]");
    if (!t) return;
    if (cy) cy.$id(t.dataset.goto).select();
    showNode(t.dataset.goto);
  });

  /* ---------- graph ---------- */
  const shapeFor = {
    component: "round-rectangle",
    datastore: "barrel",
    external_service: "cut-rectangle",
    client: "ellipse",
  };

  // Size nodes from their text so boxes stay legible and identical run to run.
  const sizeOf = (n) => {
    const lines = [n.label, n.subtype || n.kind];
    const longest = Math.max(...lines.map((l) => String(l).length));
    return { w: Math.min(210, Math.max(96, longest * 7.2 + 26)), h: 50 };
  };

  const elements = [
    ...S.nodes.map((n) => {
      const { w, h } = sizeOf(n);
      return {
        data: {
          id: n.id,
          label: n.label + "\n" + String(n.subtype || n.kind).replace(/_/g, " "),
          kind: n.kind,
          conf: n.confidence,
          status: n.status || "unknown",
          w,
          h,
        },
      };
    }),
    ...S.edges.map((e, i) => ({
      data: {
        id: "e" + i,
        source: e.from,
        target: e.to,
        label: e.label || e.type,
        conf: e.confidence,
        crosses: isExternal(e.to) || isExternal(e.from) ? "yes" : "no",
      },
    })),
  ];

  const style = [
    {
      selector: "node",
      style: {
        "background-color": "#ffffff",
        "border-width": 1.5,
        "border-color": "#16283d",
        shape: (n) => shapeFor[n.data("kind")] || "round-rectangle",
        width: "data(w)",
        height: "data(h)",
        label: "data(label)",
        "text-wrap": "wrap",
        "text-valign": "center",
        "text-halign": "center",
        "font-family": "ui-monospace, SF Mono, Menlo, monospace",
        "font-size": 11,
        "line-height": 1.45,
        color: "#16283d",
        "text-max-width": 190,
      },
    },
    { selector: 'node[kind="component"]', style: { "background-color": "#dbe7ed", "border-color": "#2e6f8e" } },
    {
      selector: 'node[kind="external_service"]',
      style: { "background-color": "#f3e2d6", "border-color": "#b4571f", color: "#7d3c12" },
    },
    { selector: 'node[kind="client"]', style: { "border-color": "#5a6b7d", color: "#5a6b7d" } },
    { selector: 'node[conf="inferred"]', style: { "border-style": "dashed" } },
    { selector: 'node[status="up"]', style: { "border-color": "#2f7d5d" } },
    { selector: 'node[status="degraded"]', style: { "border-color": "#b98700", "border-width": 3 } },
    { selector: 'node[status="down"]', style: { "border-color": "#b03636", "border-width": 3, "background-color": "#f6dede" } },
    { selector: "node:selected", style: { "border-width": 3, "border-color": "#b4571f" } },
    { selector: "node.dim", style: { opacity: 0.2 } },
    {
      selector: "edge",
      style: {
        width: 1.4,
        "line-color": "#8fa3b0",
        "target-arrow-color": "#8fa3b0",
        "target-arrow-shape": "triangle",
        "arrow-scale": 0.85,
        "curve-style": "bezier",
        label: "data(label)",
        "font-family": "ui-monospace, SF Mono, Menlo, monospace",
        "font-size": 9,
        color: "#5a6b7d",
        "text-background-color": "#eef1f2",
        "text-background-opacity": 0.9,
        "text-background-padding": 2,
        "text-rotation": "autorotate",
      },
    },
    {
      selector: 'edge[crosses="yes"]',
      style: { "line-color": "#b4571f", "target-arrow-color": "#b4571f", color: "#7d3c12", width: 1.8 },
    },
    { selector: 'edge[conf="inferred"]', style: { "line-style": "dashed" } },
    { selector: "edge.dim", style: { opacity: 0.1 } },
    { selector: "edge.hl", style: { width: 3, opacity: 1 } },
  ];

  const LAYOUT = { name: "dagre", rankDir: "LR", nodeSep: 45, rankSep: 120, edgeSep: 20, fit: true, padding: 40 };

  function runLayout() {
    // dagre is the layout we want; if it ever fails, a breadthfirst fallback still
    // produces a readable left-to-right graph rather than a pile of overlapping boxes.
    try {
      cy.layout(LAYOUT).run();
    } catch (err) {
      console.warn("dagre layout unavailable, falling back to breadthfirst:", err);
      cy.layout({ name: "breadthfirst", directed: true, spacingFactor: 1.3, padding: 40 }).run();
    }
  }

  try {
    if (window.cytoscapeDagre) cytoscape.use(window.cytoscapeDagre);
    cy = cytoscape({ container: document.getElementById("cy"), elements, style, layout: { name: "preset" } });
    runLayout();
    cy.on("tap", "node", (e) => showNode(e.target.id()));
    cy.on("tap", (e) => {
      if (e.target === cy) clearDetail();
    });
  } catch (err) {
    console.error("graph failed to render:", err);
    document.getElementById("cy").innerHTML =
      '<p style="padding:24px;font-size:13px;line-height:1.6">The graph could not be drawn in this browser, ' +
      "but the model is intact: every node, connection, and piece of evidence is in the panel on the right.</p>";
  }

  /* ---------- controls ---------- */
  document.getElementById("fit").onclick = () => cy && cy.fit(undefined, 40);
  document.getElementById("relayout").onclick = () => cy && runLayout();
  document.getElementById("png").onclick = () => {
    if (!cy) return;
    const a = document.createElement("a");
    a.href = cy.png({ scale: 2, bg: "#eef1f2", full: true });
    a.download = "system-map.png";
    a.click();
  };

  /* ---------- live status (optional) ---------- */
  const banner = document.getElementById("statusline");
  async function poll() {
    try {
      const r = await fetch("status.json?t=" + Date.now(), { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      const s = await r.json();
      let up = 0,
        total = 0;
      Object.entries(s.nodes || {}).forEach(([id, v]) => {
        if (!byId[id]) return;
        byId[id].status = v.status;
        if (cy) cy.$id(id).data("status", v.status);
        total++;
        if (v.status === "up") up++;
      });
      if (!total) throw new Error("no probes");
      banner.innerHTML =
        `<span class="dot ${up === total ? "up" : "down"}"></span>${up}/${total} probes healthy · ` +
        `checked ${esc(s.checked_at || "")}`;
      const sel = cy && cy.$("node:selected");
      if (sel && sel.length) showNode(sel.id());
    } catch (err) {
      banner.innerHTML =
        '<span class="dot unknown"></span>Static map — no live probes. Run <code>healthcheck.py</code> ' +
        "beside this file to light it up.";
    }
  }
  poll();
  setInterval(poll, 15000);
})();

</script>
