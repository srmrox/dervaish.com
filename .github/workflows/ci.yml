name: CI

# Auto-triggers (push / pull_request) are disabled: GitHub Actions cannot run on
# this account while it is billing-locked, so every push otherwise registers a
# failing check that never actually started. Restore the block below once Actions
# is available again:
#   on:
#     push:
#       branches: [main]
#     pull_request:
on:
  workflow_dispatch:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npm run typecheck -w @dervaish/api
      - name: Build
        run: npm run build -w @dervaish/api

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/platform-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: .
      - name: Build (bundle)
        # esbuild/rollup transpile without type-checking; the strict `tsc` gate
        # (npm run build) is being re-greened separately.
        run: npx vite build
