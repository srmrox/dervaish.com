server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA history fallback — every route resolves to the app shell.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Runtime config + shell must never be cached (env.js is rewritten per deploy).
  location = /env.js {
    add_header Cache-Control "no-store" always;
  }
  location = /index.html {
    add_header Cache-Control "no-store" always;
  }

  # Fingerprinted assets can be cached hard.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }
}
