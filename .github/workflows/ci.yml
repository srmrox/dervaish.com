name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dervaish
          POSTGRES_PASSWORD: dervaish
          POSTGRES_DB: dervaish
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dervaish"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SECRET_KEY: ci-insecure-test-key
      DJANGO_DEBUG: "false"
      DATABASE_URL: postgres://dervaish:dervaish@localhost:5432/dervaish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check .
      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run
      - name: Django system check
        run: python manage.py check
      - name: Tests
        run: python manage.py test -v2
