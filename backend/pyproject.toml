[tool.ruff]
target-version = "py312"
line-length = 120
extend-exclude = ["*/migrations/*"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]  # DRF/Django commonly call functions in argument defaults

[tool.ruff.lint.isort]
known-first-party = [
    "config", "common", "accounts", "taxonomy", "catalog",
    "media", "lyrics", "archive", "community", "federation",
]
