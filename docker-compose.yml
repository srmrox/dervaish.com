services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dervaish
      POSTGRES_USER: dervaish
      POSTGRES_PASSWORD: dervaish
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dervaish
      MINIO_ROOT_PASSWORD: dervaish-local
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:

